name: Build & Release APK

# Runs after the version-bump workflow completes on main.
# Using workflow_run instead of push so [skip ci] commits don't block it.

on:
  workflow_run:
    workflows: ["Bump patch version"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^VERSION_NAME=' android/version.properties | cut -d= -f2)
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > android/app/keystore/droneopssync.keystore

      - name: Build APK
        env:
          KEYSTORE_PATH: keystore/droneopssync.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: droneopssync
        run: |
          cd android
          chmod +x gradlew
          bash gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             DroneOpsSync-v${{ steps.version.outputs.name }}.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: DroneOpsSync v${{ steps.version.outputs.name }}
          files: DroneOpsSync-v${{ steps.version.outputs.name }}.apk
          generate_release_notes: true
