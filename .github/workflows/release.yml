name: Build & Release APK

# Runs after the version-bump workflow completes on main.
# Using workflow_run instead of push so [skip ci] commits don't block it.

on:
  workflow_run:
    workflows: ["Bump patch version"]
    branches: [main]
    types: [completed]

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^VERSION_NAME=' android/version.properties | cut -d= -f2)
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             DroneOpsSync-v${{ steps.version.outputs.name }}.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: DroneOpsSync v${{ steps.version.outputs.name }}
          files: DroneOpsSync-v${{ steps.version.outputs.name }}.apk
          generate_release_notes: true
